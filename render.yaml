services:
  - type: web
    name: sdm-search-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 60 --preload
    healthCheckPath: /health
    envVars:
      - key: APOLLO_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: RENDER
        value: "true"
